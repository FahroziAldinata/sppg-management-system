<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
<meta charset="UTF-8" />
<title>Test Card & Dropdown</title>

<link rel="stylesheet" href="./styles/tokens.css" />
<link rel="stylesheet" href="./index.css" />

<style>
  body {
    padding: 40px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
  }

  #theme-toggle {
    padding: 6px 12px;
    cursor: pointer;
  }
</style>
</head>
<body>

<button id="theme-toggle" type="button">
  Toggle Dark Mode
</button>

<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script>
document.getElementById('theme-toggle').onclick = () => {
  const html = document.documentElement;
  html.dataset.theme =
    html.dataset.theme === 'dark'
      ? 'light'
      : 'dark';
};
</script>

<script type="text/babel">

const { useState, useRef, useEffect, useId } = React;

function Dropdown({
  options,
  value,
  onChange,
  placeholder = "Pilih...",
  style
}) {

  const [open, setOpen] = useState(false);
  const [activeIndex, setActiveIndex] = useState(-1);

  const containerRef = useRef(null);
  const id = useId();

  const selected =
    options.find(o => o.value === value);

  useEffect(() => {
    function onClickOutside(e) {
      if (
        containerRef.current &&
        !containerRef.current.contains(e.target)
      ) {
        setOpen(false);
      }
    }

    document.addEventListener(
      "mousedown",
      onClickOutside
    );

    return () =>
      document.removeEventListener(
        "mousedown",
        onClickOutside
      );
  }, []);

  function openList() {
    setOpen(true);

    setActiveIndex(
      Math.max(
        0,
        options.findIndex(
          o => o.value === value
        )
      )
    );
  }

  function selectOption(opt) {
    onChange(opt.value);
    setOpen(false);
  }

  return (
    <div
      className="custom-select-container"
      ref={containerRef}
      style={style}
    >
      <button
        type="button"
        id={id}
        className={`custom-select-trigger${open ? " active" : ""}`}
        aria-haspopup="listbox"
        aria-expanded={open}
        onClick={() =>
          open
            ? setOpen(false)
            : openList()
        }
      >
        <span>
          {selected
            ? selected.label
            : placeholder}
        </span>

        <span
          aria-hidden
          style={{
            marginLeft: 8,
            opacity: 0.6
          }}
        >
          ▾
        </span>
      </button>

      {open && (
        <ul
          className="custom-select-dropdown"
          role="listbox"
          aria-labelledby={id}
        >
          {options.map((opt, i) => (
            <li
              key={opt.value}
              role="option"
              aria-selected={
                opt.value === value
              }
              tabIndex={-1}
              className={`
                custom-select-option
                ${opt.value === value ? " selected" : ""}
                ${i === activeIndex ? " hovered" : ""}
              `}
              onMouseDown={e =>
                e.preventDefault()
              }
              onMouseEnter={() =>
                setActiveIndex(i)
              }
              onClick={() =>
                selectOption(opt)
              }
            >
              {opt.label}
            </li>
          ))}
        </ul>
      )}
    </div>
  );
}

function App() {

  const [periode, setPeriode] =
    useState(
      "periode-contoh-8-17-jan-2026"
    );

  return (
    <div
      style={{
        display: "grid",
        gap: "16px",
        width: "800px"
      }}
    >
      <div
        className="ui-card"
        style={{
          padding: "20px"
        }}
      >
        <h3>Periode Aktif</h3>

        <p>
          8 Januari 2026 -
          17 Januari 2026
        </p>
      </div>

      <Dropdown
        style={{
          width: 300
        }}
        options={[
          {
            value:
              "periode-contoh-8-17-jan-2026",
            label:
              "2026-01-08 - 2026-01-17"
          },
          {
            value: "periode-2",
            label:
              "2026-01-18 - 2026-01-27"
          },
          {
            value: "periode-3",
            label:
              "2026-01-28 - 2026-02-06"
          }
        ]}
        value={periode}
        onChange={setPeriode}
      />
    </div>
  );
}

ReactDOM
  .createRoot(
    document.getElementById("root")
  )
  .render(<App />);

</script>

</body>
</html>
